<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <title>Delete Item with Animation</title>
</head>
<body>

<div class="container mt-5">
  <!-- Button to trigger deletion and show alert -->
  <button id="deleteButton" class="btn btn-danger">Delete Item</button>

  <!-- Alert for successful deletion -->
  <div id="deleteAlert" class="alert alert-success alert-dismissible fade mt-3" role="alert" style="display: none;">
    <strong>Success!</strong> Item deleted successfully.
    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.9/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
  // Function to handle item deletion and show alert
  function deleteItem() {
    // Your deletion logic goes here

    // Show the alert after successful deletion
    $('#deleteAlert').fadeIn().delay(2000).fadeOut(); // Fade in, wait 2 seconds, then fade out
  }

  // Attach the function to the button click event
  $('#deleteButton').on('click', deleteItem);
</script>

</body>
</html>
